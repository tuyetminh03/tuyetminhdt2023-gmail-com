<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>In bảng cửu chương</title>
  <link rel="stylesheet" href="../css/style6.css">
</head>
<body>
<form id = "formBangcc">
  <label>Nhập số:</label>
  <input type="text" id="txtSo" value="9">
  <input type="button" id="btnIn" value="In bảng">
</form>
<div id="kq"></div>
<script>
document.getElementById("btnIn").onclick = function() {
    let so = document.getElementById("txtSo").value;
    let kq = "";
    for (let i = 1; i <= 10; i++) {
        kq += so + " x " + i + " = " + (so * i) + "<br>";
    }
    document.getElementById("kq").innerHTML = kq;
  }
  </script>
</body>
</html>
