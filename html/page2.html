<!DOCTYPE html>
<html lang="vi">
<head>
   <title>Thiết kế form</title>

</head>
<body>
    <div class="container">
        <form id="frmLogin">
            <h3>Đăng nhập hệ thống</h3>
            <div class="form-group">
                <label class="label" for="txtUsername">Tên đăng nhập:</label>
               <input class="form-control" type="text"id="txtUsername"name="txtUsername">
               </div>
               <div class="form-group">
                <label class="label" for="txtUsername">password:</label>
               <input class="form-control" type="password"id="txtPassword"name="txtPassword">
               <input type="submit"id="sbLogin"name="sbLogin"value="Đăng nhập">
        </form>
    </div>
</body>
</html>
